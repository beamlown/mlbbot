<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
     shape-rendering="crispEdges">
  <!-- Haiku — Leadoff Rookie: small batter, helmet low, bat ready -->
  <rect x="6"  y="2"  width="4" height="3"/>   <!-- helmet -->
  <rect x="7"  y="5"  width="2" height="1"/>   <!-- face -->
  <rect x="5"  y="6"  width="6" height="4"/>   <!-- jersey -->
  <rect x="4"  y="6"  width="1" height="3"/>   <!-- arm L -->
  <rect x="11" y="6"  width="1" height="3"/>   <!-- arm R -->
  <rect x="12" y="3"  width="1" height="6"/>   <!-- bat -->
  <rect x="6"  y="10" width="2" height="3"/>   <!-- leg L -->
  <rect x="8"  y="10" width="2" height="3"/>   <!-- leg R -->
  <rect x="5"  y="13" width="3" height="1"/>   <!-- shoe L -->
  <rect x="8"  y="13" width="3" height="1"/>   <!-- shoe R -->
</svg>
