<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 8 8" fill="currentColor"
     shape-rendering="crispEdges">
  <!-- trophy: cup + handles + base -->
  <rect x="1" y="1" width="6" height="1"/>   <!-- rim -->
  <rect x="2" y="2" width="4" height="2"/>   <!-- cup body -->
  <rect x="0" y="2" width="1" height="2"/>   <!-- handle L -->
  <rect x="7" y="2" width="1" height="2"/>   <!-- handle R -->
  <rect x="3" y="4" width="2" height="1"/>   <!-- stem -->
  <rect x="2" y="5" width="4" height="1"/>   <!-- base -->
  <rect x="1" y="6" width="6" height="1"/>   <!-- base wide -->
</svg>
