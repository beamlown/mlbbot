<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Control Plane · BOT_BRIDGE{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
<header class="topbar">
  <div class="topbar-left">
    <a href="{{ url_for('tasks.board') }}" class="brand">BOT_BRIDGE · Control Plane</a>
    <nav class="nav">
      <a href="{{ url_for('tasks.board') }}">Board</a>
      <a href="{{ url_for('artifacts.list_artifacts') }}">Artifacts</a>
      <a href="{{ url_for('system.system_page') }}">System</a>
    </nav>
  </div>
  <div class="topbar-right">
    <label class="role-switch" title="Acting role (Phase 4 enforces)">
      <span class="role-label">acting as</span>
      <select id="acting-role-select" onchange="setActingRole(this.value)">
        {% for key, info in ROLE_INFO.items() %}
          <option value="{{ key }}" {% if ACTING_ROLE == key %}selected{% endif %}>{{ info.display }}</option>
        {% endfor %}
      </select>
    </label>
    <a class="btn btn-xs btn-accent" href="{{ url_for('tasks.task_new') }}">+ New Task</a>
    <button class="btn btn-xs" onclick="regenerateBoard(this)">Regenerate board.md</button>
    <button class="btn btn-xs" onclick="reimport(this)">Re-import</button>
  </div>
</header>

<main class="page">
{% block content %}{% endblock %}
</main>

<footer class="footer">
  <span>repo {{ SETTINGS.repo_root }}</span>
  <span>db {{ SETTINGS.db_path.name }}</span>
  <span>port {{ SETTINGS.port }}</span>
</footer>

<div id="toast-root"></div>

<script>
function toast(msg, ok=true) {
  const root = document.getElementById('toast-root');
  const el = document.createElement('div');
  el.className = 'toast ' + (ok ? 'ok' : 'err');
  el.textContent = msg;
  root.appendChild(el);
  setTimeout(() => el.classList.add('show'), 10);
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 3200);
}

async function postJSON(url, body) {
  const r = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body || {}),
  });
  let j = {};
  try { j = await r.json(); } catch (_) {}
  return {ok: r.ok, status: r.status, json: j};
}

async function patchJSON(url, body) {
  const r = await fetch(url, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body || {}),
  });
  let j = {};
  try { j = await r.json(); } catch (_) {}
  return {ok: r.ok, status: r.status, json: j};
}

async function reimport(btn) {
  btn.disabled = true;
  const txt = btn.textContent;
  btn.textContent = "…importing";
  try {
    const r = await fetch('/api/import', {method: 'POST'});
    const j = await r.json();
    toast(`Imported tasks=${j.tasks_seen} new=${j.tasks_new} artifacts=${j.artifacts_new}`);
    setTimeout(() => location.reload(), 500);
  } catch (e) {
    toast("Import failed: " + e, false);
  } finally {
    btn.disabled = false;
    btn.textContent = txt;
  }
}

async function regenerateBoard(btn) {
  btn.disabled = true;
  const txt = btn.textContent;
  btn.textContent = "…regenerating";
  try {
    const res = await postJSON('/api/board/regenerate', {});
    if (res.ok && res.json.ok) {
      toast(`board.md rewritten (${(res.json.sha256 || '').slice(0, 8)}…)`);
    } else {
      toast("Regenerate failed: " + (res.json.error || res.status), false);
    }
  } catch (e) {
    toast("Regenerate failed: " + e, false);
  } finally {
    btn.disabled = false;
    btn.textContent = txt;
  }
}

async function setActingRole(role) {
  const res = await postJSON('/api/settings/acting_role', {role});
  if (res.ok && res.json.ok) {
    toast("Acting role: " + role);
  } else {
    toast("Failed to set role", false);
  }
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
