<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Control Plane · BOT_BRIDGE{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
<header class="topbar">
  <div class="topbar-left">
    <a href="{{ url_for('tasks.board') }}" class="brand">BOT_BRIDGE · Control Plane</a>
    <nav class="nav">
      <a href="{{ url_for('tasks.board') }}">Board</a>
      <a href="{{ url_for('artifacts.list_artifacts') }}">Artifacts</a>
      <a href="{{ url_for('system.system_page') }}">System</a>
    </nav>
  </div>
  <div class="topbar-right">
    <span class="badge badge-role" title="Acting role (Phase 4 enforces)">{{ ROLE_INFO[ACTING_ROLE].display if ACTING_ROLE in ROLE_INFO else ACTING_ROLE }}</span>
    <button class="btn btn-xs" onclick="reimport()">Re-import</button>
  </div>
</header>

<main class="page">
{% block content %}{% endblock %}
</main>

<footer class="footer">
  <span>repo {{ SETTINGS.repo_root }}</span>
  <span>db {{ SETTINGS.db_path.name }}</span>
  <span>port {{ SETTINGS.port }}</span>
</footer>

<script>
async function reimport() {
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = "…importing";
  try {
    const r = await fetch('/api/import', {method: 'POST'});
    const j = await r.json();
    alert(`Imported: tasks_seen=${j.tasks_seen} new=${j.tasks_new} artifacts_new=${j.artifacts_new}\nerrors=${j.errors.length}`);
    location.reload();
  } catch (e) {
    alert("Import failed: " + e);
  } finally {
    btn.disabled = false;
    btn.textContent = "Re-import";
  }
}
</script>
</body>
</html>
